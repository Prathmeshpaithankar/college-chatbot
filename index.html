<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="top-bar">
    <h2>🎓 AI College Chatbot</h2>
    <button onclick="toggleMode()">🌙</button>
</div>

<div class="chat-box" id="chat">

    {% for m in messages %}
        <div class="msg {{ m.role }}">
            {{ m.text }}
        </div>
    {% endfor %}

</div>

<form action="/chat" method="post" class="input-box">
    <input type="text" name="message" id="msg" placeholder="Ask something..." required>

    <button type="button" onclick="startVoice()">🎤</button>
    <button type="submit">Send</button>
</form>

<script src="/static/script.js"></script>

</body>
</html>
